<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #e5e7eb; display: flex; gap: 2rem; padding: 2rem; font-family: sans-serif; }
        .demo-box { text-align: center; }
        .gut-container {
            width: 150px;
            height: 155px;
            position: relative;
            margin-bottom: 1rem;
        }
        .gut-img {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* Poop animation (linear top down for testing) */
        @keyframes pooMove {
            0% { top: 10%; left: 10%; }
            100% { top: 90%; left: 90%; }
        }
        .poop {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(255,0,0,1) 0%, rgba(128,0,0,0.5) 50%, rgba(0,0,0,0) 100%);
            border-radius: 50%;
            animation: pooMove 3s infinite linear;
            margin: -20px 0 0 -20px; 
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="demo-box">
        <h3>Option 2: Displacement Map</h3>
        <div class="gut-container">
            <svg width="0" height="0">
                <defs>
                    <filter id="displace">
                        <!-- We need an animated map to displace against -->
                        <feImage href="gradient.png" x="0" y="0" width="40" height="40" result="map">
                            <animate attributeName="x" values="0;150" dur="3s" repeatCount="indefinite"/>
                            <animate attributeName="y" values="0;155" dur="3s" repeatCount="indefinite"/>
                        </feImage>
                        <feDisplacementMap in="SourceGraphic" in2="map" scale="20" xChannelSelector="R" yChannelSelector="G"/>
                    </filter>
                </defs>
            </svg>
            <img src="gut-exact.png" class="gut-img" style="filter: url(#displace);" />
        </div>
    </div>

</body>
</html>
